  </script>
</head>
<body>

  <!-- ELEGANT LOADER — Ratio Calculation -->
  <div class="loader" id="loader" aria-hidden="true">
    <svg viewBox="0 0 240 240" fill="none">
      <path class="raw" id="loaderRaw" d=""></path>
      <path class="clean" id="loaderClean" d="M40 168 C 70 60, 120 60, 120 120 S 170 180, 200 72"></path>
    </svg>
    <div class="loader__count">Calculating ratios · <b id="loaderKB">16:9</b></div>
  </div>

  <!-- CUSTOM CURSOR — The Anchor Node -->
  <div class="anchor" id="anchor" aria-hidden="true">
    <svg viewBox="0 0 40 40">
      <line class="cross" x1="20" y1="6" x2="20" y2="34"></line>
      <line class="cross" x1="6" y1="20" x2="34" y2="20"></line>
      <rect class="node-sq" x="14" y="14" width="12" height="12"></rect>
      <circle class="hdot handle" id="h1" cx="4" cy="20" r="2.5"></circle>
      <circle class="hdot handle" id="h2" cx="36" cy="20" r="2.5"></circle>
    </svg>
  </div>

  <main class="frame">

    <!-- TOP REGISTER — margin stamps + kinetic truncation logo -->
    <header class="register">
      <div class="register__meta">
        <b>ASPECT</b><br>
        <span class="dim">ASPECT RATIO /</span><br>
        <span class="dim">CALCULATOR</span>
      </div>

      <div class="logo" id="logo" aria-label="ASPECT">
        <div class="logo__l1">ASPECT</div>
        <div class="logo__l2">ASPECT</div>
        <div class="logo__l3"><span>ASPECT</span><span class="logo__vb mono">16:9</span></div>
      </div>

      <div class="register__meta register__meta--right">
        <span class="dim">EST.</span> <b>CALYVENT</b><br>
        <span class="dim">100% CLIENT-SIDE</span><br>
        <span class="dim">NO UPLOAD · NO ACCOUNT</span>
      </div>
    </header>

    <!-- THE STAGE — dimension input + output visualization -->
    <section class="stage">

      <!-- LEFT — DIMENSION INPUT -->
      <div class="panel" id="inputPanel">
        <div class="panel__head"><span>Input · Dimensions</span><span class="idx">01</span></div>
        <div class="panel__body">
          <div class="input-group">
            <label class="input-label">Width (px)</label>
            <input type="number" class="dimension-input" id="widthInput" placeholder="1920" min="1">
          </div>
          <div class="input-group">
            <label class="input-label">Height (px)</label>
            <input type="number" class="dimension-input" id="heightInput" placeholder="1080" min="1">
          </div>
          <button class="run" id="calcBtn">Calculate</button>
        </div>
      </div>

      <!-- CENTER — LIVE CANVAS + RATIO DISPLAY -->
      <div class="panel center" id="centerPanel">
        <div class="panel__head"><span>Proof · Live Canvas</span><span class="idx">02</span></div>
        <div class="panel__body">
          <div class="canvas-wrapper" id="canvasWrapper">
            <div class="canvas-box" id="canvasBox">
              <span class="canvas-label" id="canvasLabel">16:9</span>
            </div>
          </div>
          <div class="metrics">
            <div class="ratio-display">
              <div class="ratio-main" id="ratioMain">16:9</div>
              <div class="ratio-decimal" id="ratioDecimal">1.78</div>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT — CODE OUTPUT -->
      <div class="panel" id="outputPanel">
        <div class="panel__head"><span>Export · Code</span><span class="idx">03</span></div>
        <div class="panel__body">
          <div class="tabs" id="tabs" role="tablist">
            <button class="tab is-active" data-fmt="css" role="tab">CSS</button>
            <button class="tab" data-fmt="tailwind" role="tab">Tailwind</button>
          </div>
          <textarea class="code is-out" id="outputCode" spellcheck="false" readonly placeholder="code appears here"></textarea>
          <div class="export-actions">
            <button id="copyBtn">Copy</button>
          </div>
        </div>
      </div>

    </section>

    <!-- HISTORY RAIL -->
    <nav class="rail" aria-label="Session history">
      <span class="rail__lbl">Recent ·</span>
      <div class="rail__slips" id="slips"></div>
      <button class="rail__clear" id="clearSlips" hidden>clear</button>
    </nav>

    <!-- ATTRIBUTION STAMPS -->
    <footer class="attrib">
      <div class="forge">
        Forged by <a href="https://velocity.calyvent.com" target="_blank" rel="noopener"><b>Velocity</b></a>
        — Digital Architecture House
      </div>
      <div class="legal">
        <a href="https://calyvent.com" target="_blank" rel="noopener"><b>Calyvent</b></a>
        <a href="/privacy.html">Privacy</a>
        <a href="/terms.html">Terms</a>
      </div>
    </footer>

  </main>

  <div class="toast" id="toast"></div>

  <script type="module" src="/assets/app.js"></script>
